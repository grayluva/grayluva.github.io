<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>404 | Grayluva Design</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f7fc;
        color: #111120;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 32px;
      }

      main {
        max-width: 520px;
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: clamp(48px, 10vw, 96px);
        font-weight: 400;
        letter-spacing: -0.05em;
      }

      p {
        margin: 18px 0 0;
        color: rgb(17 17 32 / 0.62);
        font-size: 18px;
        line-height: 1.7;
      }

      a {
        display: inline-flex;
        margin-top: 28px;
        color: inherit;
        text-decoration: none;
        border-bottom: 1px solid currentColor;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          background: #09090b;
          color: #eaeaf2;
        }

        p {
          color: rgb(234 234 242 / 0.68);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>404</h1>
      <p>This page does not exist or was moved.</p>
      <a href="/">Back to home</a>
    </main>
  </body>
</html>
