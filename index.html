    <script>
      (function() {
        function getTimeBasedTheme() {
          var hour = new Date().getHours();
          return hour >= 19 || hour < 7 ? 'dark' : 'light';
        }
        try {
          var theme = localStorage.getItem('theme-preference');
          if (!theme) {
            theme = getTimeBasedTheme();
          }
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
